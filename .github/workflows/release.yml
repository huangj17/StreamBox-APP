name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

defaults:
  run:
    working-directory: client

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename artifact
        working-directory: ${{ github.workspace }}
        run: mv client/build/app/outputs/flutter-apk/app-release.apk StreamBox-${{ github.ref_name }}-android.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: StreamBox-${{ github.ref_name }}-android.apk

  macos:
    name: macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip .app
        working-directory: ${{ github.workspace }}
        run: |
          cd client/build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/StreamBox-${{ github.ref_name }}-macos.zip" *.app
      - uses: softprops/action-gh-release@v2
        with:
          files: StreamBox-${{ github.ref_name }}-macos.zip

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip Release dir
        working-directory: ${{ github.workspace }}
        run: Compress-Archive -Path client/build/windows/x64/runner/Release/* -DestinationPath StreamBox-${{ github.ref_name }}-windows.zip
        shell: pwsh
      - uses: softprops/action-gh-release@v2
        with:
          files: StreamBox-${{ github.ref_name }}-windows.zip
